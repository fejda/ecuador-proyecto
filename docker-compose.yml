version: '3.8'

services:
  # Servidor H2 (base de datos independiente)
  h2-server:
    image: oscarfonts/h2:latest
    container_name: ecuador-h2
    ports:
      - "8082:8082"   # Puerto para la consola web
      - "9092:9092"   # Puerto para conexión TCP
    environment:
      - H2_OPTIONS=-webPort 8082 -tcpPort 9092 -tcpAllowOthers
    volumes:
      - h2-data:/opt/h2-data
    networks:
      - ecuador-net
    restart: unless-stopped

  # Aplicación Spring Boot
  app:
    build: .
    container_name: ecuador-app
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - JWT_SECRET=clave-super-secreta-para-produccion-2025
      # Conectar al servidor H2 (nombre del servicio = hostname)
      - DB_URL=jdbc:h2:tcp://h2-server:9092/./data/ecuador
      - DB_USER=frank
      - DB_PASSWORD=2907
    depends_on:
      - h2-server
    networks:
      - ecuador-net
    restart: unless-stopped

volumes:
  h2-data:

networks:
  ecuador-net:
    driver: bridge