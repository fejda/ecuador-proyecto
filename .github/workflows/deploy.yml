name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger deploy on Render
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": true}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Response status: $HTTP_CODE"
          echo "Response body: $BODY"

          if [ "$HTTP_CODE" -ne 201 ]; then
            echo "❌ Deploy trigger failed with status $HTTP_CODE"
            exit 1
          fi

          echo "✅ Deploy triggered successfully on Render!"

      - name: Summary
        if: success()
        run: |
          echo "### Deploy Triggered Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** main" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered at:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "Check deploy status at: https://dashboard.render.com" >> $GITHUB_STEP_SUMMARY