<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/header :: header}"><title>Correo ya registrado</title></head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<div class="container page">

    <div class="mb-2">
        <a href="/public/contact" class="btn-back">← Volver al formulario</a>
    </div>

    <div class="card warning-box">
        <div class="warning-icon">⚠️</div>
        <h2 class="warning-title">¡Correo ya registrado!</h2>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="warning-data">
            <p><strong>📧 Correo:</strong> <span th:text="${contactRequest.email}"></span></p>
            <p><strong>👤 Nombre:</strong> <span th:text="${contactRequest.name}"></span></p>
            <p><strong>📞 Teléfono:</strong> <span th:text="${contactRequest.telephone}"></span></p>
            <p><strong>🎯 Finalidad:</strong> <span th:text="${contactRequest.purpose.getVisualName()}"></span></p>
        </div>

        <p class="text-muted mb-4">Este correo electrónico ya tiene un registro previo. ¿Deseas continuar de todas formas?</p>

        <div class="warning-actions">
            <form action="#" th:action="@{/public/contact/force}" method="post">
                <input type="hidden" name="email" th:value="${contactRequest.email}">
                <input type="hidden" name="name" th:value="${contactRequest.name}">
                <input type="hidden" name="telephone" th:value="${contactRequest.telephone}">
                <input type="hidden" name="purpose" th:value="${contactRequest.purpose}">
                <button type="submit" class="btn-confirm">✅ Sí, continuar</button>
            </form>
            <a href="/public/contact" class="btn-back">🔄 Usar otro correo</a>
        </div>
    </div>

</div>

<div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
