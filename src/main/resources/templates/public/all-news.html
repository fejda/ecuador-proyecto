<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/header :: header}"><title>Noticias</title></head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<div class="container page">

    <div class="page-header">
        <h1 class="page-title">Noticias</h1>
        <p class="page-subtitle">Mantente informado con las últimas novedades</p>
    </div>

    <div th:if="${news.isEmpty()}" class="empty-state">
        <p>No hay noticias publicadas aún.</p>
    </div>

    <div th:unless="${news.isEmpty()}" class="grid-news">
        <div th:each="n : ${news}" class="card" style="overflow:hidden;">
            <img th:src="${n.mainImageUrl}" class="card-img" onerror="this.src='https://via.placeholder.com/400x200'">
            <div class="card-tag">Noticia</div>
            <h3 class="card-title" th:text="${n.title}"></h3>
            <p class="card-meta">
                <span th:text="${#dates.format(n.publicationDate, 'dd/MM/yyyy')}"></span> | <span th:text="${n.author}"></span>
            </p>
            <p class="card-text" th:text="${n.summary}"></p>
            <a th:href="@{'/public/news/' + ${n.id}}" class="card-link">Leer más →</a>
        </div>
    </div>

    <div class="text-center mt-4">
        <a href="/" class="btn-back">← Volver al inicio</a>
    </div>

</div>

<div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
