<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/header :: header}"><title>Testimonios</title></head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<div class="container page">

  <div class="page-header">
    <h1 class="page-title"> Testimonios de éxito </h1>
    <p class="page-subtitle">Personas que han confiado en nosotros</p>
  </div>

  <div th:if="${testimonies.isEmpty()}" class="empty-state">
    <p>No hay testimonios publicados aún. ¡Sé el primero!</p>
    <a href="/public/contact" class="btn-primary">Compartir mi experiencia</a>
  </div>

  <div th:unless="${testimonies.isEmpty()}" class="grid-testimonials">
    <div th:each="t : ${testimonies}" class="testimony-card">
      <img th:src="${t.photoURL}" th:alt="'Foto de ' + ${t.name}"
           class="testimony-avatar"
           onclick="window.open(this.src, '_blank')"
           onerror="this.onerror=null; this.src='https://via.placeholder.com/120?text=Sin+Foto';">
      <div class="testimony-click-hint">Click para ampliar</div>
      <h3 class="testimony-name" th:text="${t.name}"></h3>
      <div class="testimony-links">
        <a th:if="${t.instagramURL}" th:href="${t.instagramURL}" target="_blank">📷 Instagram</a>
        <a th:if="${t.facebookURL}" th:href="${t.facebookURL}" target="_blank">📘 Facebook</a>
      </div>
    </div>
  </div>

</div>

<div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
