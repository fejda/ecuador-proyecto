<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/header :: header}"><title>Acceso Administrativo</title></head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<div class="container page flex-center" style="min-height: 80vh;">

  <div style="max-width: 420px; width: 100%;">

    <div class="page-header">
      <h1 class="page-title">Acceso Seguro</h1>
      <p class="page-subtitle">Ingrese sus credenciales institucionales para gestionar el patrimonio cultural.</p>
    </div>

    <div th:if="${error}" class="alert alert-error">
        <span th:text="${error}"></span>
    </div>

    <form action="/auth/login" method="post" class="form-card">

      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" name="email" required>
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="password" required>
      </div>

      <button type="submit" class="btn-primary btn-full">Acceder al Panel →</button>

    </form>

    <div class="text-center mt-2">
      <a href="/" class="card-link">← Volver al inicio</a>
    </div>

  </div>

</div>

<div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
