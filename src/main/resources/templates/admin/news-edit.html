<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/header :: header}"><title>Editar Noticia</title></head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<div class="container-md page-admin">

    <div class="page-admin-header">
        <h1 class="page-admin-title">Editar Noticia</h1>
    </div>

    <form action="#" th:action="@{'/admin/news/' + ${news.id}}" th:object="${news}" method="post" class="admin-form-card">
        <input type="hidden" name="_method" value="put">

        <div class="form-group">
            <label>Título *</label>
            <input type="text" th:field="*{title}" required>
        </div>

        <div class="form-group">
            <label>Resumen *</label>
            <textarea th:field="*{summary}" rows="3" required></textarea>
        </div>

        <div class="form-group">
            <label>Contenido *</label>
            <textarea th:field="*{content}" rows="10" required></textarea>
        </div>

        <div class="form-group">
            <label>URL Imagen principal</label>
            <input type="url" th:field="*{mainImageUrl}" required>
        </div>

        <div class="form-group">
            <label>Autor *</label>
            <input type="text" th:field="*{author}" required>
        </div>

        <div class="form-group">
            <label>Estado</label>
            <select th:field="*{status}">
                <option value="DRAFT">Borrador</option>
                <option value="PUBLISHED">Publicado</option>
            </select>
        </div>

        <button type="submit" class="btn-primary btn-full">Actualizar Noticia</button>

    </form>
</div>

<div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
