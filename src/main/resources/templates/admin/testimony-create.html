<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/header :: header}"><title>Crear Testimonio</title></head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<div class="container-sm page-admin">

    <div class="page-admin-header">
        <h1 class="page-admin-title">Crear Nuevo Testimonio</h1>
    </div>

    <form action="#" th:action="@{/admin/testimonies}" th:object="${testimonyRequest}" method="post" class="admin-form-card">

        <div class="form-group">
            <label>Nombre *</label>
            <input type="text" th:field="*{name}" required>
        </div>

        <div class="form-group">
            <label>URL de la Foto *</label>
            <input type="url" th:field="*{photoURL}" required placeholder="https://ejemplo.com/foto.jpg">
        </div>

        <div class="form-group">
            <label>Instagram URL</label>
            <input type="url" th:field="*{instagramURL}" placeholder="https://instagram.com/usuario">
        </div>

        <div class="form-group">
            <label>Facebook URL</label>
            <input type="url" th:field="*{facebookURL}" placeholder="https://facebook.com/usuario">
        </div>

        <button type="submit" class="btn-primary btn-full">Guardar Testimonio</button>

    </form>
</div>

<div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
