<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/header :: header}"><title>Editar Testimonio</title></head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<div class="container-sm page-admin">

    <div class="page-admin-header">
        <h1 class="page-admin-title">Editar Testimonio</h1>
    </div>

    <form action="#" th:action="@{'/admin/testimonies/' + ${testimony.id}}" th:object="${testimony}" method="post" class="admin-form-card">
        <input type="hidden" name="_method" value="put">

        <div class="form-group">
            <label>Nombre *</label>
            <input type="text" th:field="*{name}" required>
        </div>

        <div class="form-group">
            <label>URL de la Foto *</label>
            <input type="url" th:field="*{photoURL}" required>
        </div>

        <div class="form-group">
            <label>Instagram URL</label>
            <input type="url" th:field="*{instagramURL}">
        </div>

        <div class="form-group">
            <label>Facebook URL</label>
            <input type="url" th:field="*{facebookURL}">
        </div>

        <button type="submit" class="btn-primary btn-full">Actualizar Testimonio</button>

    </form>
</div>

<div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
