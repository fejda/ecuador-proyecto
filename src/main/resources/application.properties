# Server
server.port=${PORT:8080}

# H2 Database - MODO SERVIDOR (conecta a H2 en Docker)
spring.datasource.url=${DB_URL:jdbc:h2:tcp://localhost:9092/./data/ecuador}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DB_USER:frank}
spring.datasource.password=${DB_PASSWORD:2907}

# H2 Console (deshabilitada porque ahora la consola est· en el puerto 8082)
spring.h2.console.enabled=false

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT
jwt.secret=${JWT_SECRET:mySecretKey}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Thymeleaf
spring.thymeleaf.cache=false