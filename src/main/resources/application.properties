# Server
server.port=${PORT:8080}

# H2 Database - Modo PERSISTENTE (archivo)
spring.datasource.url=jdbc:h2:file:./data/ecuador;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=frank
spring.datasource.password=2907

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGeneration2025FundacionLatinoamerica}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Thymeleaf
spring.thymeleaf.cache=false

# Devtools
spring.devtools.restart.enabled=true