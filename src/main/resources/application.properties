# Server
server.port=8080

# Database H2 - Modo ARCHIVO (persistente)
spring.datasource.url=jdbc:h2:file:./data/latindb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=frank
spring.datasource.password=2907

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2

# JPA - USAR "update" PARA CONSERVAR DATOS ENTRE REINICIOS
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Deshabilitar data.sql
spring.sql.init.mode=never

# JWT
jwt.secret=mySecretKeyForJWTTokenGeneration2025FundacionLatinoamerica
jwt.expiration=86400000

# Thymeleaf
spring.thymeleaf.cache=false

# Devtools
spring.devtools.restart.enabled=true