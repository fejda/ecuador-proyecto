# ============================================
# SERVIDOR
# ============================================
server.port=${PORT:8080}

# ============================================
# BASE DE DATOS - POSTGRESQL
# ============================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ecuador_db}
spring.datasource.username=${DB_USER:frank}
spring.datasource.password=${DB_PASSWORD:290307}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# JWT
# ============================================
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGeneration2025FundacionLatinoamerica}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================
# THYMELEAF
# ============================================
spring.thymeleaf.cache=false

# ============================================
# DEVTOOLS
# ============================================
spring.devtools.restart.enabled=true